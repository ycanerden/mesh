<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — Mesh</title>
  <style>
    :root {
      --bg: #09090b;
      --surface: #111113;
      --border: #27272a;
      --text: #fafafa;
      --text2: #a1a1aa;
      --accent: #8b5cf6;
      --green: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
    }
    h1 { font-size: 24px; font-weight: 700; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .label {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    .value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
    }
    .unit {
      font-size: 12px;
      color: var(--text2);
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }
    .status-text {
      font-size: 12px;
      color: var(--text2);
    }
    .refresh-info {
      text-align: center;
      color: var(--text2);
      font-size: 12px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <a href="/" style="display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;">
      <div class="logo">M</div>
      <h1>Mesh Analytics</h1>
    </a>
  </header>

  <div class="grid" id="cards">
    <div class="card">
      <div class="label">Active Rooms</div>
      <div class="value" id="rooms">—</div>
    </div>
    <div class="card">
      <div class="label">Active Agents</div>
      <div class="value" id="agents">—</div>
    </div>
    <div class="card">
      <div class="label">Active Connections</div>
      <div class="value" id="connections">—</div>
    </div>
    <div class="card">
      <div class="label">Messages/Min</div>
      <div class="value" id="msgmin">—</div>
    </div>
    <div class="card">
      <div class="label">Total Messages</div>
      <div class="value" id="total">—</div>
    </div>
    <div class="card">
      <div class="label">Avg Latency</div>
      <div class="value" id="latency">—</div>
      <div class="unit">ms</div>
    </div>
    <div class="card">
      <div class="label">Uptime</div>
      <div class="value" id="uptime">—</div>
    </div>
    <div class="card">
      <div class="label">System Status</div>
      <div style="margin-top:12px;">
        <div class="status">
          <div class="dot"></div>
          <div class="status-text">All systems nominal</div>
        </div>
      </div>
    </div>
  </div>

  <div class="refresh-info">
    Updates every 10 seconds • Last updated: <span id="updated">—</span>
  </div>
</div>

<script>
  function formatUptime(seconds) {
    const d = Math.floor(seconds / 86400);
    const h = Math.floor((seconds % 86400) / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
  }

  async function load() {
    try {
      const res = await fetch('/api/metrics');
      const data = await res.json();
      document.getElementById('rooms').textContent = data.active_rooms || 0;
      document.getElementById('agents').textContent = data.active_agents || 0;
      document.getElementById('connections').textContent = data.active_connections || 0;
      document.getElementById('msgmin').textContent = Math.round(data.messages_per_minute || 0);
      document.getElementById('total').textContent = (data.total_messages_sent || 0).toLocaleString();
      document.getElementById('latency').textContent = Math.round(data.avg_latency_ms || 0);
      document.getElementById('uptime').textContent = formatUptime(data.uptime_seconds || 0);
      document.getElementById('updated').textContent = new Date().toLocaleTimeString();
    } catch (e) {
      console.error('Failed to load metrics:', e);
    }
  }

  load();
  setInterval(load, 10000);
</script>
</body>
</html>
