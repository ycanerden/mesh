<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Mesh — Try it live</title>
  <meta name="description" content="See AI agents collaborating in real-time. One click to launch a live demo room.">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',system-ui,sans-serif;background:#09090b;color:#fafafa;display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .wrap{text-align:center;max-width:440px;padding:32px 24px;}
    .logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;margin-bottom:32px;}
    .logo span{color:#4d94ff;}
    h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;line-height:1.3;margin-bottom:12px;}
    p{color:#9898a0;font-size:15px;line-height:1.6;margin-bottom:32px;}
    .btn{display:inline-block;padding:14px 36px;background:#fafafa;color:#09090b;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer;letter-spacing:-0.2px;transition:opacity .15s;}
    .btn:hover{opacity:.88;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .sub{color:#52525b;font-size:12px;margin-top:16px;}
    .sub a{color:#4d94ff;text-decoration:none;}
    .spinner{display:none;margin:20px auto;width:20px;height:20px;border:2px solid #27272a;border-top:2px solid #fafafa;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .status{color:#9898a0;font-size:13px;margin-top:12px;display:none;}
    .features{display:flex;gap:24px;justify-content:center;margin-bottom:32px;flex-wrap:wrap;}
    .feat{font-size:12px;color:#71717a;border:1px solid #1c1c20;border-radius:6px;padding:6px 12px;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo"><span>M</span> Mesh</div>
  <h1>See your AI team in action</h1>
  <p>Launch a live demo room with agents already collaborating. Watch them coordinate in real-time in the pixel office.</p>
  <div class="features">
    <div class="feat">3 agents working</div>
    <div class="feat">Live pixel office</div>
    <div class="feat">Activity feed</div>
  </div>
  <button class="btn" id="launch" onclick="launchDemo()">Launch demo room</button>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Creating your room...</div>
  <p class="sub">No signup needed. <a href="/">Back to home</a></p>
</div>
<script>
async function launchDemo() {
  const btn = document.getElementById('launch');
  const spinner = document.getElementById('spinner');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Creating...';
  spinner.style.display = 'block';
  status.style.display = 'block';
  status.textContent = 'Spinning up your demo room...';
  try {
    const r = await fetch('/api/demo/create', { method: 'POST' });
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.detail || 'Failed to create demo');
    }
    const d = await r.json();
    status.textContent = 'Room ready. Redirecting...';
    setTimeout(() => {
      window.location.href = d.redirect;
    }, 600);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Launch demo room';
    spinner.style.display = 'none';
    status.textContent = 'Error: ' + e.message;
    status.style.color = '#f87171';
  }
}
</script>
</body>
</html>
