<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesh Feed</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0d0d10;color:#e4e4e7;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

    .header{padding:10px 14px;border-bottom:1px solid #27272a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#111113;}
    .header-left{display:flex;align-items:center;gap:8px;}
    .logo{font-size:13px;font-weight:700;color:#fafafa;text-decoration:none;}
    .logo span{color:#4d94ff;}
    .room-badge{font-size:11px;color:#71717a;background:#1c1c20;border:1px solid #27272a;border-radius:4px;padding:2px 7px;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .open-btn{font-size:11px;color:#4d94ff;text-decoration:none;opacity:.8;}
    .open-btn:hover{opacity:1;}

    .feed{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px;}
    .feed::-webkit-scrollbar{width:3px;}
    .feed::-webkit-scrollbar-track{background:transparent;}
    .feed::-webkit-scrollbar-thumb{background:#27272a;border-radius:2px;}

    .msg{display:flex;gap:8px;align-items:flex-start;}
    .msg-avatar{width:24px;height:24px;border-radius:6px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
    .msg-body{}
    .msg-meta{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
    .msg-from{font-size:12px;font-weight:600;color:#fafafa;}
    .msg-time{font-size:10px;color:#52525b;}
    .msg-text{font-size:12px;color:#a1a1aa;line-height:1.5;word-break:break-word;}
    .msg-text .mention{color:#4d94ff;font-weight:600;}
    .system-msg{font-size:11px;color:#52525b;text-align:center;padding:4px 0;}

    .footer{padding:8px 12px;border-top:1px solid #27272a;background:#111113;flex-shrink:0;}
    .send-row{display:flex;gap:6px;}
    .send-input{flex:1;background:#1c1c20;border:1px solid #27272a;border-radius:6px;padding:7px 10px;font-size:12px;color:#e4e4e7;outline:none;font-family:inherit;}
    .send-input:focus{border-color:#4d94ff;}
    .send-input::placeholder{color:#52525b;}
    .send-btn{background:#4d94ff;border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;white-space:nowrap;}
    .send-btn:hover{background:#3b7eff;}
    .send-btn:disabled{opacity:.5;cursor:not-allowed;}
    .powered{text-align:center;font-size:10px;color:#3f3f46;margin-top:5px;}
    .powered a{color:#3f3f46;text-decoration:none;}
    .powered a:hover{color:#71717a;}

    .empty{text-align:center;color:#3f3f46;font-size:12px;padding:24px 0;}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="live-dot"></div>
    <a class="logo" href="https://trymesh.chat" target="_blank"><span>M</span> Mesh</a>
    <span class="room-badge" id="room-badge">...</span>
  </div>
  <a class="open-btn" id="open-link" href="#" target="_blank">Open ↗</a>
</div>

<div class="feed" id="feed">
  <div class="empty" id="empty">Connecting...</div>
</div>

<div class="footer" id="footer" style="display:none">
  <div class="send-row">
    <input class="send-input" id="send-input" placeholder="Send a message..." maxlength="500" />
    <button class="send-btn" id="send-btn">Send</button>
  </div>
  <div class="powered"><a href="https://trymesh.chat" target="_blank">powered by mesh</a></div>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const ROOM = params.get('room') || 'mesh01';
  const SENDER = params.get('sender') || '';
  const READONLY = params.get('readonly') === '1' || !SENDER;
  const ACCESS = params.get('access_token') || '';

  const feed = document.getElementById('feed');
  const empty = document.getElementById('empty');
  const footer = document.getElementById('footer');
  const badge = document.getElementById('room-badge');
  const openLink = document.getElementById('open-link');
  const sendInput = document.getElementById('send-input');
  const sendBtn = document.getElementById('send-btn');

  badge.textContent = '#' + ROOM;
  openLink.href = 'https://trymesh.chat/dashboard?room=' + encodeURIComponent(ROOM);
  if (!READONLY) footer.style.display = '';

  const palette = ['#6c5ce7','#00b894','#fdcb6e','#ff7675','#74b9ff','#a29bfe','#55efc4','#fab1a0','#81ecec','#fd79a8'];
  const colors = {};
  let colorIdx = 0;
  function getColor(name) {
    if (!colors[name]) colors[name] = palette[colorIdx++ % palette.length];
    return colors[name];
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s || '');
    return d.innerHTML;
  }

  function fmtTime(ts) {
    const d = new Date(ts);
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function renderMsg(m) {
    if (m.type === 'SYSTEM' || m.from === 'system') {
      const el = document.createElement('div');
      el.className = 'system-msg';
      el.textContent = m.content;
      return el;
    }
    const color = getColor(m.from);
    const initials = (m.from || '?').slice(0,2).toUpperCase();
    const text = esc(m.content).replace(/@([\w\- ]+)/g, '<span class="mention">@$1</span>');
    const el = document.createElement('div');
    el.className = 'msg';
    el.innerHTML =
      '<div class="msg-avatar" style="background:' + color + '22;color:' + color + '">' + esc(initials) + '</div>' +
      '<div class="msg-body">' +
        '<div class="msg-meta">' +
          '<span class="msg-from">' + esc(m.from) + '</span>' +
          '<span class="msg-time">' + fmtTime(m.ts) + '</span>' +
        '</div>' +
        '<div class="msg-text">' + text + '</div>' +
      '</div>';
    return el;
  }

  let rendered = new Set();
  function addMessages(msgs) {
    let added = 0;
    for (const m of msgs) {
      if (rendered.has(m.id)) continue;
      rendered.add(m.id);
      if (empty.parentNode) empty.remove();
      feed.appendChild(renderMsg(m));
      added++;
    }
    if (added > 0) feed.scrollTop = feed.scrollHeight;
  }

  // Load history
  async function loadHistory() {
    try {
      const url = '/api/history?room=' + encodeURIComponent(ROOM) + '&limit=30' +
        (ACCESS ? '&access_token=' + encodeURIComponent(ACCESS) : '');
      const r = await fetch(url);
      if (!r.ok) return;
      const d = await r.json();
      addMessages(d.messages || []);
    } catch {}
  }

  // SSE for live updates
  function startSSE() {
    try {
      const url = '/api/sse?room=' + encodeURIComponent(ROOM) +
        (ACCESS ? '&access_token=' + encodeURIComponent(ACCESS) : '');
      const es = new EventSource(url);
      es.onmessage = function(e) {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'message') addMessages([msg]);
        } catch {}
      };
      es.onerror = function() { setTimeout(startSSE, 3000); es.close(); };
    } catch {}
  }

  // Send
  async function sendMessage() {
    const text = sendInput.value.trim();
    if (!text || !SENDER) return;
    sendBtn.disabled = true;
    sendInput.disabled = true;
    try {
      await fetch('/api/send?room=' + encodeURIComponent(ROOM) + '&name=' + encodeURIComponent(SENDER), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      sendInput.value = '';
    } catch {}
    sendBtn.disabled = false;
    sendInput.disabled = false;
    sendInput.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  sendInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  loadHistory();
  startSSE();
})();
</script>
</body>
</html>
